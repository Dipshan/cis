# Show messages longer (5 seconds)
set -g display-time 5000
set -g display-panes-time 5000

# Set Ctrl+P as the prefix key (caught by tmux, never reaches shell)
set -g prefix C-p
unbind C-b

# Show menu when Ctrl+P is pressed
bind C-p display-message "CIS: (d)request | (1)release | (w)who | (m)msg | (g)grant | (k)kick"

# CIS COMMAND BINDINGS

# Allow controller to voluntarily give up control
bind 1 run-shell "$HOME/cis/bin/in-session-release.sh '#{session_name}' '#{client_tty}'"

# List all participants and their roles
bind w run-shell "$HOME/cis/bin/in-session-who.sh '#{session_name}' '#{client_tty}'"

# Broadcast message to all participants
bind m command-prompt -p "Message: " "run-shell '$HOME/cis/bin/in-session-message.sh \"#{session_name}\" \"#{client_tty}\" \"%%\"'"

# Host-only: grant control to specific user
bind g command-prompt -p "Grant to: " "run-shell '$HOME/cis/bin/in-session-grant.sh \"#{session_name}\" \"#{client_tty}\" \"%%\"'"

# Host-only: remove user from session
bind k command-prompt -p "Kick: " "run-shell '$HOME/cis/bin/in-session-kick.sh \"#{session_name}\" \"#{client_tty}\" \"%%\"'"

# CLIENT DETACH HANDLER

# Run disconnect script when any client leaves
set-hook -g client-detached "run-shell '$HOME/cis/bin/handle-disconnect.sh \"#{session_name}\"'"

# VISUAL INDICATORS

# Status line base colors
set -g status-style "bg=black,fg=white"
set -g status-right-style "bg=black,fg=yellow"

# Show roles: HOST, OBSERVER, or CONTROLLER
set -g status-left "#[bg=blue,fg=white,bold] #(TTY=\$(echo '#{client_tty}' | sed 's|/|_|g'); cat $HOME/cis/trace/sessions/#{session_name}/role.\$TTY 2>/dev/null | tr '[:lower:]' '[:upper:]' || echo 'OBSERVER') #[default]"

# Message styling
set -g message-style "bg=blue,fg=white"

# Don't exit when client detaches
set -g detach-on-destroy off
set -g destroy-unattached off

# Refresh status line every second
set -g status-interval 1